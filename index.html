<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tr1pL39 | Application Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="application-container">
    <div class="warning-header">
        <div class="warning-icon">⚠️</div>
        <div class="warning-text">
            TR1PL39 APPLICATION FORM
            <span>San Andreas Community Is Together</span>
        </div>
    </div>

    <form id="discordForm">
        <div class="form-section">
            <div class="section-title">Personal Information <span class="counter">0/1000</span></div>
            <div class="input-grid">
                <div class="input-box">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Your Name" required>
                    <span class="char-count">0/1000</span>
                </div>
                <div class="input-box">
                    <label>ID Nick</label>
                    <input type="text" id="idNick" placeholder="In-game Nick" required>
                    <span class="char-count">0/1000</span>
                </div>
                <div class="input-box">
                    <label>Account Name</label>
                    <input type="text" id="accName" placeholder="Account Name">
                    <span class="char-count">0/1000</span>
                </div>
                <div class="input-box">
                    <label>Serial Number</label>
                    <input type="text" id="serial" placeholder="Your MTA Serial">
                    <span class="char-count">0/1000</span>
                </div>
                <div class="input-box">
                    <label>Discord Username</label>
                    <input type="text" id="discord" placeholder="username#0000">
                    <span class="char-count">0/1000</span>
                </div>
                <div class="input-box">
                    <label>Country Code</label>
                    <input type="text" id="country" placeholder="e.g. MA, US, FR">
                    <span class="char-count">0/2</span>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="section-title">Game Information <span class="counter">0/1000</span></div>
            <div class="input-grid">
                <div class="input-box">
                    <label>Stats Link</label>
                    <input type="url" id="stats" placeholder="CIT Stats URL">
                    <span class="char-count">0/1000</span>
                </div>
                <div class="input-box">
                    <label>Punishing Link</label>
                    <input type="url" id="punish" placeholder="CIT Punish URL">
                    <span class="char-count">0/1000</span>
                </div>
            </div>
            <div class="input-box full-width">
                <label>Interview Ready?</label>
                <select id="interview">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
        </div>

        <div class="form-section">
            <div class="section-title">Scenario Questions <span class="counter">0/1000</span></div>
            <div class="input-box full-width">
                <label>Define Corruption</label>
                <textarea id="corruption" placeholder="Explain..."></textarea>
                <span class="char-count">0/1000</span>
            </div>
            <div class="input-box full-width">
                <label>What is a Backup?</label>
                <textarea id="backup" placeholder="Explain..."></textarea>
                <span class="char-count">0/1000</span>
            </div>
        </div>

        <button type="submit" class="submit-btn">SUBMIT APPLICATION</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
