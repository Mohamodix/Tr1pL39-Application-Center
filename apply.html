<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TR1PL39 Application</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="apply-wrapper">

    <div class="apply-card">

        <h1 class="apply-title">TR1PL39 Application</h1>
        <p class="apply-sub">Fill the form carefully before submitting</p>

        <form id="applyForm">

            <div class="section">
                <h3>Personal Info</h3>

                <input type="text" name="name" placeholder="Full Name" required>
                <input type="text" name="age" placeholder="Age" required>
                <input type="text" name="hours" placeholder="In-game Hours" required>
            </div>

            <div class="section">
                <h3>Background</h3>

                <input type="text" name="gangs" placeholder="Previous Gangs (if any)">
            </div>

            <div class="section">
                <h3>Motivation</h3>

                <textarea name="why" placeholder="Why do you want to join TR1PL39?" required></textarea>
                <textarea name="experience" placeholder="Your experience in CIT / RP"></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Application</button>

        </form>

        <a class="back" href="index.html">Back</a>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
