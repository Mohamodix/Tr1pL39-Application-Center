<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TR1PL39 Application</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h2 style="text-align:center;">TR1PL39 Application Form</h2>

    <form id="applyForm">

        <input type="text" name="name" placeholder="Your Name" required>

        <input type="text" name="age" placeholder="Age" required>

        <input type="text" name="hours" placeholder="In-game Hours" required>

        <!-- FIXED FIELD -->
        <input type="text" name="gangs" placeholder="Previous Gangs">

        <!-- ADDED (common missing video field) -->
        <input type="text" name="activity" placeholder="Daily Activity (hours per day)">

        <!-- OPTIONAL (often in recruitment forms) -->
        <input type="text" name="discord" placeholder="Discord Username">

        <textarea name="why" placeholder="Why do you want to join TR1PL39?" required></textarea>

        <textarea name="experience" placeholder="Your experience in CIT / RP"></textarea>

        <button type="submit">Submit Application</button>

    </form>

    <a class="back" href="index.html">← Back</a>

</div>

<script src="script.js"></script>

</body>
</html>
