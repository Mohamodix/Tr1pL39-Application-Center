<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application - TR1PL39</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-center">

    <div class="app-box">

        <h1>Application Form</h1>
        <p>Fill everything correctly. Wrong info = denial.</p>

        <form id="applyForm">

            <div class="row">
                <input name="name" placeholder="Full Name" required>
                <input name="age" placeholder="Age" required>
            </div>

            <input name="hours" placeholder="In-game Hours" required>

            <input name="gangs" placeholder="Previous Gangs (optional)">

            <textarea name="why" placeholder="Why do you want to join TR1PL39?" required></textarea>

            <textarea name="experience" placeholder="Your RP / CIT Experience"></textarea>

            <button type="submit">Submit Application</button>

            <a href="index.html" class="back">Back to Home</a>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
